<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Abdullahi MT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 100px auto 50px;
      padding: 0 20px;
    }
    .login-box, .dashboard {
      background: white;
      border-radius: 30px;
      padding: 40px;
      box-shadow: var(--shadow);
    }
    .login-box h2, .dashboard h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .login-box input {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
    }
    .login-box button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .form-group input[type="file"] {
      padding: 8px;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .notification-item {
      background: #f8fafc;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .notification-item img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
    }
    .delete-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
    }
    .logout-btn {
      background: #64748b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      float: right;
    }
    .location-display {
      background: #f0f9ff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <nav class="navbar" style="background: #0f172a;">
    <div class="nav-container">
      <div class="nav-logo">
        <img src="logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/50'">
        <span class="logo-text">ADMIN PANEL</span>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <div id="loginForm" class="login-box">
      <h2>Admin Login</h2>
      <input type="password" id="passwordInput" placeholder="Enter password">
      <button onclick="login()">Login</button>
      <p style="margin-top: 15px; color: #666;">Use password: <strong>Mt#68552</strong></p>
    </div>

    <div id="dashboard" class="dashboard" style="display: none;">
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      <h2><i class="fas fa-cog"></i> Admin Dashboard</h2>

      <div class="location-display" id="currentLocationDisplay">
        <strong>Current Location:</strong> <span id="locationText">Not set</span>
      </div>
      <div class="form-group">
        <label>Update Current Location</label>
        <input type="text" id="locationInput" placeholder="e.g., Malumfashi & Kwari Market, Kano">
        <button class="btn-primary" onclick="updateLocation()" style="margin-top: 10px;">Update Location</button>
      </div>

      <hr style="margin: 30px 0;">

      <h3><i class="fas fa-bell"></i> Add Notification</h3>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="notifTitle" placeholder="Notification title">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="notifDesc" rows="3" placeholder="Notification details"></textarea>
      </div>
      <div class="form-group">
        <label>Image (optional)</label>
        <input type="file" id="notifImage" accept="image/*">
      </div>
      <button class="btn-primary" onclick="addNotification()">Post Notification</button>

      <hr style="margin: 30px 0;">

      <h3><i class="fas fa-list"></i> Existing Notifications</h3>
      <div id="notificationsList"></div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'Mt#68552';

    function login() {
      const pwd = document.getElementById('passwordInput').value;
      if (pwd === ADMIN_PASSWORD) {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadDashboardData();
      } else {
        alert('Incorrect password!');
      }
    }

    function logout() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }

    function loadDashboardData() {
      const location = localStorage.getItem('currentLocation') || 'Malumfashi & Kwari Market, Kano';
      document.getElementById('locationText').innerText = location;
      document.getElementById('locationInput').value = location;
      displayNotifications();
    }

    function updateLocation() {
      const newLocation = document.getElementById('locationInput').value;
      if (newLocation) {
        localStorage.setItem('currentLocation', newLocation);
        document.getElementById('locationText').innerText = newLocation;
        alert('Location updated!');
      }
    }

    function addNotification() {
      const title = document.getElementById('notifTitle').value;
      const desc = document.getElementById('notifDesc').value;
      const imageFile = document.getElementById('notifImage').files[0];

      if (!title || !desc) {
        alert('Please fill title and description');
        return;
      }

      if (imageFile) {
        const reader = new FileReader();
        reader.onload = function (e) {
          saveNotification(title, desc, e.target.result);
        };
        reader.readAsDataURL(imageFile);
      } else {
        saveNotification(title, desc, null);
      }
    }

    function saveNotification(title, desc, imageBase64) {
      const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
      const newNotif = {
        id: Date.now(),
        title,
        description: desc,
        image: imageBase64,
        date: new Date().toLocaleString()
      };
      notifications.push(newNotif);
      localStorage.setItem('notifications', JSON.stringify(notifications));

      document.getElementById('notifTitle').value = '';
      document.getElementById('notifDesc').value = '';
      document.getElementById('notifImage').value = '';

      displayNotifications();
    }

    function displayNotifications() {
      const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
      const listDiv = document.getElementById('notificationsList');
      if (notifications.length === 0) {
        listDiv.innerHTML = '<p>No notifications yet.</p>';
        return;
      }

      let html = '';
      notifications.reverse().forEach(notif => {
        html += `
          <div class="notification-item" id="notif-${notif.id}">
            ${notif.image ? `<img src="${notif.image}" alt="Notification image">` : ''}
            <div class="content">
              <h4>${notif.title}</h4>
              <p>${notif.description}</p>
              <small>${notif.date}</small>
            </div>
            <button class="delete-btn" onclick="deleteNotification(${notif.id})">Delete</button>
          </div>
        `;
      });
      listDiv.innerHTML = html;
    }

    function deleteNotification(id) {
      let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
      notifications = notifications.filter(n => n.id !== id);
      localStorage.setItem('notifications', JSON.stringify(notifications));
      displayNotifications();
    }
  </script>
</body>
</html>
